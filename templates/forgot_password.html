{% extends "base.html" %}

{% block title %}Reset Password | Zero2Hero{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <span style="font-size: 3rem;">🔒</span>
            <h1 style="font-weight: 800; margin-top: 1rem;">Reset Password</h1>
            <p style="color: var(--text-dim);">Enter your username to receive reset instructions</p>
        </div>

        <form>
            <div class="input-group">
                <label>Username</label>
                <input type="text" placeholder="Enter your username" required>
            </div>
            
            <button type="button" class="btn" onclick="alert('Password reset link sent to registered email (Simulated)')">Send Instructions</button>
        </form>

        <p style="text-align: center; margin-top: 2rem; color: var(--text-dim); font-size: 0.9rem;">
            Remembered? <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none; font-weight: 700;">Back to Login</a>
        </p>
    </div>
</div>
{% endblock %}
